<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nizam Portfolio Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#000;color:#fff;overflow-x:hidden}
.container{width:90%;margin:auto}

nav{display:flex;justify-content:space-between;padding:20px 0}
nav a{color:#aaa;text-decoration:none;margin:0 10px}
nav a:hover{color:#fff}

.hero{display:flex;align-items:center;justify-content:space-between;height:90vh}
.left{max-width:500px}
.left h1{font-size:40px;margin-bottom:10px;opacity:0}
.left p{color:#aaa;margin-bottom:20px;opacity:0}
.btn{background:#22c55e;padding:12px 25px;border-radius:8px;color:#000;font-weight:bold;text-decoration:none}

.right img{width:300px;height:300px;border-radius:50%;object-fit:cover;border:4px solid #22c55e;opacity:0}

.section{padding:60px 0;text-align:center}
.card{background:#111;padding:20px;border-radius:10px;margin:20px auto;max-width:500px;opacity:0;transform:translateY(80px)}

.doc a{display:block;margin:10px;padding:10px;background:#1f2937;border-radius:8px;text-decoration:none;color:#fff}
.doc a:hover{background:#22c55e;color:#000}
</style>
</head>
<body>

<div class="container">

<nav>
  <div><b>NIZAM</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#docs">Documents</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero">
  <div class="left">
    <h1 id="title">MD NIZAM UDDIN (ニザム)</h1>
    <p id="subtitle">Student | IT Engineer</p>
    <a href="#docs" class="btn">View My Documents</a>
  </div>
  <div class="right">
    <img src="profile.jpg" id="profile">
  </div>
</div>

<div class="section" id="docs">
  <h2>My Documents</h2>
  <div class="card" id="docCard">
    <div class="doc">
      <a href="cv.pdf" target="_blank">📄 View CV</a>
      <a href="certificate.pdf" target="_blank">📜 Certificate</a>
      <a href="nid.pdf" target="_blank">🪪 NID</a>
    </div>
  </div>
</div>

<div class="section" id="contact">
  <div class="card" id="contactCard">
    <h2>Contact</h2>
    <p>Email: mdnizamuddinniyon@gmail.com</p>
    <p><a href="https://www.facebook.com/nizam1230" target="_blank">MD NIZAM UDDIN</a></p>
  </div>
</div>

</div>

<script>
gsap.registerPlugin(ScrollTrigger);

// hero animation
gsap.to("#title",{opacity:1,y:-20,duration:1});
gsap.to("#subtitle",{opacity:1,y:-20,delay:.3,duration:1});
gsap.to("#profile",{opacity:1,scale:1.1,delay:.5,duration:1});

// floating profile
gsap.to("#profile",{y:-15,repeat:-1,yoyo:true,duration:2});

// scroll animations
gsap.to("#docCard",{
  scrollTrigger:{trigger:"#docCard",start:"top 80%"},
  opacity:1,y:0,duration:1
});

gsap.to("#contactCard",{
  scrollTrigger:{trigger:"#contactCard",start:"top 80%"},
  opacity:1,y:0,duration:1
});
</script>

</body>
</html>
