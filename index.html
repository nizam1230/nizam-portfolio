<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nizam Portfolio Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#000;color:#fff}
.container{width:90%;margin:auto}

nav{display:flex;justify-content:space-between;padding:20px 0}
nav a{color:#aaa;text-decoration:none;margin:0 10px;cursor:pointer}
nav a:hover{color:#fff}

.section{display:none;padding:60px 0;text-align:center}
.active{display:block}

.hero{display:flex;align-items:center;justify-content:space-between;height:80vh}
.left{max-width:500px}
.left h1{font-size:40px;margin-bottom:10px}
.left p{color:#aaa;margin-bottom:20px}
.btn{background:#22c55e;padding:12px 25px;border-radius:8px;color:#000;text-decoration:none}

.right img{width:300px;height:300px;border-radius:50%;object-fit:cover;border:4px solid #22c55e}

.card{background:#111;padding:20px;border-radius:10px;margin:20px auto;max-width:500px}

.doc a{display:block;margin:10px;padding:10px;background:#1f2937;border-radius:8px;text-decoration:none;color:#fff}
.doc a:hover{background:#22c55e;color:#000}
</style>
</head>
<body>

<div class="container">

<nav>
  <div><b>NIZAM</b></div>
  <div>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('docs')">Documents</a>
    <a onclick="showPage('contact')">Contact</a>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <div class="left">
      <h1>MD NIZAM UDDIN</h1>
      <p>Student | IT Engineer</p>
      <a onclick="showPage('docs')" class="btn">View Documents</a>
    </div>
    <div class="right">
      <img src="profile.jpg">
    </div>
  </div>
</div>

<!-- DOCUMENT -->
<div id="docs" class="section">
  <h2>My Documents</h2>
  <div class="card doc">
    <a href="cv.pdf" target="_blank">📄 View CV</a>
    <a href="certificate.pdf" target="_blank">📜 Certificate</a>
    <a href="nid.pdf" target="_blank">🪪 NID</a>
  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <div class="card">
    <h2>Contact</h2>
    <p>Email: mdnizamuddinniyon@gmail.com</p>
    <p><a href="https://www.facebook.com/nizam1230" target="_blank">MD NIZAM UDDIN</a></p>
  </div>
</div>

</div>

<script>
function showPage(page){
  document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
